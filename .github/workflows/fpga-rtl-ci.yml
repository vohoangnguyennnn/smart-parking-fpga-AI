name: FPGA RTL CI

on:
  push:
    paths: ['FPGA/**']
  pull_request:
    paths: ['FPGA/**']

jobs:
  # ── Job 1: Kiểm tra syntax toàn bộ RTL ─────────────────────────────────────
  rtl-syntax:
    name: RTL Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install iverilog
        run: sudo apt-get install -y --no-install-recommends iverilog

      - name: Compile all RTL modules together
        run: |
          iverilog -g2012 -tnull FPGA/rtl/*.v
          echo "All RTL files compiled successfully"

  # ── Job 2: Smoke-test the iverilog-portable testbenches ─────────────────────
  # Full functional sign-off is done in Questa (see docs/waveform/). CI runs the
  # subset of testbenches that are portable to the open-source Icarus Verilog;
  # the remaining ones use SystemVerilog features Icarus does not support.
  simulation:
    name: Run Testbenches (iverilog smoke tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install iverilog
        run: sudo apt-get install -y --no-install-recommends iverilog

      - name: Run iverilog-compatible testbenches
        working-directory: FPGA
        run: |
          TESTBENCHES="
            tb_uart_rx
            tb_uart_tx
            tb_uart_frame_parser
            tb_ir_sensor_debounce
            tb_seven_seg_decoder
            tb_parking_uart_top
          "
          FAILED=0
          RTL_FILES=$(ls rtl/*.v)
          mkdir -p sim_out

          for TB_NAME in $TESTBENCHES; do
            printf '\n══ %s ══\n' "$TB_NAME"

            # ── Compile ──────────────────────────────────────────────────────
            if ! iverilog -g2012 -s "$TB_NAME" \
                          -o "sim_out/$TB_NAME" \
                          "tb/$TB_NAME.sv" $RTL_FILES 2>&1; then
              echo "✗ COMPILE FAILED: $TB_NAME"
              FAILED=1
              continue
            fi

            # ── Simulate (timeout 90s per testbench) ─────────────────────────
            OUTPUT=$(timeout 90 vvp "sim_out/$TB_NAME" 2>&1 || true)
            echo "$OUTPUT"

            if echo "$OUTPUT" | grep -q "SOME TESTS FAILED"; then
              echo "✗ SIM FAILED: $TB_NAME"
              FAILED=1
            elif echo "$OUTPUT" | grep -q "ALL TESTS PASSED"; then
              echo "✓ PASSED: $TB_NAME"
            else
              echo "⚠ UNKNOWN RESULT: $TB_NAME (no summary line found)"
              FAILED=1
            fi
          done

          exit $FAILED
